openapi: 3.0.0

info:
  title: FlowPay Attendance API
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local

tags:
  - name: Tickets
    description: Ticket lifecycle
  - name: Dashboard
    description: System metrics

paths:
  /tickets:
    post:
      tags: [Tickets]
      operationId: createTicket
      summary: Create ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject]
              properties:
                subject:
                  type: string
                  example: Problemas com cartão
      responses:
        "201":
          description: Ticket created

  /tickets/{id}/complete:
    patch:
      tags: [Tickets]
      operationId: completeTicket
      summary: Complete ticket
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "1"
      responses:
        "200":
          description: Ticket completed

  /dashboard/summary:
    get:
      tags: [Dashboard]
      operationId: getDashboardSummary
      summary: System summary
      responses:
        "200":
          description: Dashboard metrics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalQueued:
                    type: number
                  totalActive:
                    type: number
                  totalCompleted:
                    type: number
